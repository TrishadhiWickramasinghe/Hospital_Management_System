spring:
  application:
    name: hospital-management-system
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/hospital_db}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 3001
  servlet:
    context-path: /api

jwt:
  secret: ${JWT_SECRET:your-super-secret-key-change-this-in-production}
  expiration: 86400000 # 24 hours in milliseconds

logging:
  level:
    root: INFO
    com.hospital: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
